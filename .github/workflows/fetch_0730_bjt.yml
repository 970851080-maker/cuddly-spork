name: Fetch news (07:30 BJT)

on:
  schedule:
    # Beijing 07:30 = UTC 23:30 (previous day)
    - cron: "30 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -r requirements.txt
      - name: Generate
        run: python -m news_daily generate --sources sources.yaml
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/daily output/news_daily.sqlite3 || true
          git commit -m "news: daily fetch" || exit 0
          git push
